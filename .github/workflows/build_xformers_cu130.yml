name: Build xformers Wheel (torch 2.11.0 + CUDA 13.0 + Blackwell)

on:
  workflow_dispatch:
    inputs:
      xformers_ref:
        description: "xformers branch / tag / commit (default: main)"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:13.0.1-devel-ubuntu22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_CUDA: "1"
      # Nur Blackwell sm_120 – kein Multi-Arch, spart RAM und Zeit
      TORCH_CUDA_ARCH_LIST: "12.0"
      # Parallel-Jobs: xformers ist sehr speicherintensiv
      MAX_JOBS: "4"
      # CUDA_HOME + PATH: nvcc muss für xformers und den Compiler gefunden werden
      CUDA_HOME: "/usr/local/cuda"

    steps:
      - name: Install system packages
        run: |
          apt-get update -y
          apt-get install -y \
            python3.10 python3.10-dev python3-pip python3-distutils \
            git build-essential ninja-build
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1
          update-alternatives --install /usr/bin/python  python  /usr/bin/python3.10 1
          # CUDA-Binaries dauerhaft in PATH eintragen
          echo "PATH=/usr/local/cuda/bin:$PATH" >> $GITHUB_ENV
          python --version

      - name: Verify nvcc
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          which nvcc
          nvcc --version
          echo "CUDA_HOME=$CUDA_HOME"

      - name: Upgrade pip and build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install PyTorch 2.11.0 + cu130
        run: |
          python -m pip install \
            torch==2.11.0 \
            --index-url https://download.pytorch.org/whl/cu130
          python -c "
          import torch
          print('torch version :', torch.__version__)
          print('CUDA build    :', torch.version.cuda)
          "

      - name: Clone xformers
        run: |
          REF="${{ github.event.inputs.xformers_ref }}"
          REF="${REF:-main}"
          echo "Cloning xformers @ $REF"
          git config --global credential.helper ""
          GIT_TERMINAL_PROMPT=0 git clone https://github.com/facebookresearch/xformers.git
          cd xformers
          git checkout "$REF"
          git log --oneline -1
          # Submodule (Triton etc.)
          git submodule update --init --recursive

      - name: Build xformers wheel
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          mkdir -p /tmp/wheels
          cd xformers
          # --no-build-isolation: installiertes torch 2.11.0 verwenden
          # --no-deps beim späteren pip install verwenden, damit kein torch-Downgrade
          python -m pip wheel . \
            --no-build-isolation \
            -w /tmp/wheels/
          echo "--- Built files ---"
          ls -lh /tmp/wheels/

      - name: Verify wheel is CUDA-compiled
        run: |
          cd /tmp/wheels
          WHEEL=$(ls xformers-*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: Kein xformers-Wheel gefunden!"
            exit 1
          fi
          echo "Wheel: $WHEEL"
          if echo "$WHEEL" | grep -q "py3-none-any"; then
            echo "ERROR: py3-none-any – CUDA wurde NICHT kompiliert!"
            exit 1
          fi
          echo "OK: CUDA-kompiliertes Wheel"
          python -m zipfile -l "$WHEEL" | grep -E "\.so|_C\." | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xformers-torch2.11.0-cu130-sm120
          path: /tmp/wheels/xformers-*.whl
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xformers-torch2.11.0-cu130
          name: "xformers – torch 2.11.0 + CUDA 13.0 + Blackwell (sm_120)"
          body: |
            Custom xformers Wheel für PSHuman / HF ZeroGPU Blackwell.

            | Komponente | Version |
            |---|---|
            | Python | 3.10 |
            | torch | 2.11.0+cu130 |
            | CUDA | 13.0 |
            | GPU-Architektur | **12.0 (Blackwell sm_120)** |
            | xformers ref | `${{ github.event.inputs.xformers_ref || 'main' }}` |

            **⚠️ Installation mit `--no-deps`:**
            ```
            pip install xformers-*.whl --no-deps
            ```
            Verhindert, dass pip torch downgradet.

            **In requirements.txt (nach torch-Block eintragen):**
            ```
            https://huggingface.co/spaces/painter3000/PSHuman/resolve/main/Wheels/xformers-XXX-cp310-cp310-linux_x86_64.whl
            ```
          files: /tmp/wheels/xformers-*.whl
          draft: false
          prerelease: false
